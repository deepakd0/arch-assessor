name: CI

# Two-mode pipeline:
#  - Spec phase: spec-conformance + dependency audit always run.
#  - Code phase (src/archassessor present): lint, type-check, tests, and the
#    determinism job activate automatically via the detect-code gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spec-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: All Phase 1 specs present
        run: |
          for i in 000 001 002 003 004 005 006 007 008 009 010 011; do
            ls specs/${i}-*.md > /dev/null || { echo "ERROR: spec ${i} missing"; exit 1; }
          done
          echo "All Phase 1 specs present"
      - name: All ADRs present
        run: |
          for i in 0001 0002 0003 0004 0005 0006 0007 0008; do
            ls decisions/${i}-*.md > /dev/null || { echo "ERROR: ADR ${i} missing"; exit 1; }
          done
          echo "All ADRs present"
      - name: No hardcoded user paths
        run: |
          if grep -rn "/Users/" --include="*.py" --include="*.mjs" --include="*.json" --include="*.toml" --exclude-dir=.git .; then
            echo "ERROR: hardcoded user paths found"; exit 1
          fi
          echo "No hardcoded paths"
      - name: serve.mjs is portable
        run: grep -q "import.meta.url" serve.mjs && echo "serve.mjs resolves its own directory"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pip-audit
      - name: Zero-CVE gate (spec 007 NFR-M3)
        run: pip-audit -r requirements.txt --no-deps --disable-pip

  detect-code:
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.check.outputs.has_code }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -d src/archassessor ]; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "Spec phase: code jobs skipped until src/archassessor exists."
          fi

  lint-and-type:
    needs: detect-code
    if: needs.detect-code.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff mypy types-PyYAML -r requirements.txt
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy --strict src/
      - name: No unsafe yaml.load (spec 008 T2)
        run: |
          if grep -rn "yaml\.load(" src/ --include="*.py"; then
            echo "ERROR: unsafe yaml.load() found (use yaml.safe_load)"; exit 1
          fi

  test:
    needs: detect-code
    if: needs.detect-code.outputs.has_code == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pytest pytest-cov hypothesis
      # Floor is 80 today (current: 86%); raise to the spec 009 §2 gate of 90
      # as part of IMPLEMENTATION_STATUS.md item 7.
      - name: Full suite with coverage floor
        run: pytest tests/ -v --cov=src/archassessor --cov-branch --cov-fail-under=80

  determinism:
    needs: detect-code
    if: needs.detect-code.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install .
      - name: Byte-identical output across runs (spec 009 §7.6)
        run: |
          PYTHONHASHSEED=1 archscan graph tests/fixtures/terraform/simple > /tmp/out1.json
          PYTHONHASHSEED=2 archscan graph tests/fixtures/terraform/simple > /tmp/out2.json
          diff /tmp/out1.json /tmp/out2.json && echo "Deterministic."
